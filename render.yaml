services:
  - type: web
    name: soulnutri-ai-server
    runtime: python
    plan: free
    region: oregon

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

      # força modo embeddings (Servidor B)
      - key: RECO_MODE
        value: embeddings

      # garante caminho de dados
      - key: DATA_DIR
        value: /opt/render/project/src/data
