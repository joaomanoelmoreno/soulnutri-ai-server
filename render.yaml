services:
  - type: web
    name: soulnutri-ai-server
    runtime: python
    plan: free
    region: oregon

    buildCommand: |
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt

    startCommand: |
      python -m uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

      # opcional, mas ajuda a "travar" a versão que você já viu no log do Render
      - key: PYTHON_VERSION
        value: "3.11.8"

      # força modo embeddings (Servidor B)
      - key: RECO_MODE
        value: embeddings

      # garante caminho de dados
      - key: DATA_DIR
        value: /opt/render/project/src/data
