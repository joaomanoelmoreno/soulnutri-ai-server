# YOLOv8 Food Classification Config
# Para treinar: yolo task=classify mode=train model=yolov8n-cls.pt data=/app/ml/datasets

# Caminhos
path: /app/ml/datasets
train: train
val: val
test: test

# Classes (serão geradas automaticamente do diretório)
# nc: número de classes
# names: lista de nomes

# Hiperparâmetros recomendados para food classification
# epochs: 100
# imgsz: 224
# batch: 32
# optimizer: AdamW
# lr0: 0.001
# lrf: 0.01
# momentum: 0.937
# weight_decay: 0.0005
# warmup_epochs: 3

# Data Augmentation (importante para food images)
# hsv_h: 0.015  # variação de hue
# hsv_s: 0.7    # variação de saturação
# hsv_v: 0.4    # variação de brilho
# degrees: 15   # rotação
# translate: 0.1
# scale: 0.5
# flipud: 0.0   # não inverter verticalmente (comida tem orientação)
# fliplr: 0.5   # espelhar horizontalmente ok
# mosaic: 0.0   # desabilitar mosaic para classificação
